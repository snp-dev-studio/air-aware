<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Air Aware — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@800&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root{--teal:#0d9488;--teal-light:#14b8a6;--bg:#f1f5f9;--card:#ffffff;--card-border:rgba(0,0,0,0.08);--text:#0f172a;--text2:#475569;--text3:#94a3b8;}
[data-theme="dark"]{--teal:#f59e0b;--teal-light:#fbbf24;--bg:#0a0a0f;--card:#1a1a24;--card-border:rgba(255,255,255,0.07);--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background .4s,color .4s;overflow:hidden;}
.bg-blur{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;animation:blobFloat 8s ease-in-out infinite;}
.bg-blob:nth-child(1){width:400px;height:400px;background:var(--teal);top:-100px;left:-100px;animation-delay:0s;}
.bg-blob:nth-child(2){width:300px;height:300px;background:#8b5cf6;bottom:-80px;right:-80px;animation-delay:3s;}
.bg-blob:nth-child(3){width:200px;height:200px;background:#06b6d4;top:50%;left:60%;animation-delay:1.5s;}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);}}
.content{position:relative;z-index:1;text-align:center;max-width:480px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:32px;text-decoration:none;}
.logo-row img{width:32px;height:32px;object-fit:contain;border-radius:8px;}
.logo-row span{font-size:1.1rem;font-weight:700;color:var(--teal);}
.big-404{font-family:'Playfair Display',serif;font-size:clamp(6rem,20vw,9rem);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--teal),var(--teal-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:num404 .6s ease;}
@keyframes num404{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.cloud-icon{font-size:3rem;margin-bottom:12px;display:block;animation:iconFloat 3s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
h1{font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:10px;}
p{font-size:0.92rem;color:var(--text2);line-height:1.7;margin-bottom:28px;}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-home{padding:12px 26px;border-radius:12px;border:none;background:var(--teal);color:white;font-size:0.92rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;text-decoration:none;display:flex;align-items:center;gap:7px;transition:all .25s;}
.btn-home:hover{background:#0f766e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,148,136,0.35);}
.btn-back{padding:12px 26px;border-radius:12px;border:1.5px solid var(--card-border);background:var(--card);color:var(--text2);font-size:0.92rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-decoration:none;display:flex;align-items:center;gap:7px;transition:all .25s;}
.btn-back:hover{border-color:var(--teal);color:var(--teal);}
.theme-btn{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.95rem;transition:all .2s;z-index:10;}
.theme-btn:hover{background:var(--teal);color:white;border-color:var(--teal);}
.helpful-links{margin-top:28px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.helpful-link{padding:6px 14px;border-radius:99px;border:1.5px solid var(--card-border);background:var(--card);color:var(--text2);font-size:0.78rem;font-weight:500;text-decoration:none;transition:all .2s;}
.helpful-link:hover{border-color:var(--teal);color:var(--teal);}
</style>
</head>
<body>
<div class="bg-blur"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>

<button class="theme-btn" id="themeToggle"><i class="fa-solid fa-sun" id="themeIcon"></i></button>

<div class="content">
  <a href="index.html" class="logo-row">
    <img src="aa.jpeg" alt="Air Aware"/>
    <span>AirAware</span>
  </a>

  <span class="cloud-icon">🌫️</span>
  <div class="big-404">404</div>
  <h1>Page Not Found</h1>
  <p>Looks like this page got lost in the smog! The URL you entered doesn't exist in Air Aware. But don't worry — the air is clear on our main pages.</p>

  <div class="btns">
    <a href="dashboard.html" class="btn-home"><i class="fa-solid fa-chart-line"></i> Go to Dashboard</a>
    <a href="index.html" class="btn-back"><i class="fa-solid fa-house"></i> Home</a>
  </div>

  <div class="helpful-links">
    <a href="health.html" class="helpful-link">❤️ Health</a>
    <a href="map.html" class="helpful-link">🗺️ Map</a>
    <a href="compare.html" class="helpful-link">🔄 Compare</a>
    <a href="chatbot.html" class="helpful-link">🤖 A4 Chatbot</a>
    <a href="alerts.html" class="helpful-link">🔔 Alerts</a>
  </div>
</div>

<script>
const html=document.documentElement;
let isDark=localStorage.getItem('aa-theme')==='dark';
function applyTheme(){html.setAttribute('data-theme',isDark?'dark':'light');document.getElementById('themeIcon').className=isDark?'fa-solid fa-moon':'fa-solid fa-sun';}
applyTheme();
document.getElementById('themeToggle').addEventListener('click',()=>{isDark=!isDark;localStorage.setItem('aa-theme',isDark?'dark':'light');applyTheme();});
</script>
</body>
</html>
